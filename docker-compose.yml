services:
  seiza-server:
    build: .
    ports:
      - "8080:8080"
    environment:
      SEIZA_STAR_DATA: /catalog/stars-lite-tycho2.bin
      SEIZA_DATA_DIR: /app/data
      SEIZA_WORKER_COUNT: "1"
      SEIZA_AUTH_MODE: public
    volumes:
      # Download this once with `seiza download-data prebuilt --output data`.
      - ./data/catalog:/catalog:ro
      - seiza-uploads:/app/data

volumes:
  seiza-uploads:
