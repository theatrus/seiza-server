name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Seiza Server version to release (without the v prefix)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: seiza-server-release
  cancel-in-progress: false

jobs:
  preflight:
    name: Validate release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Match the requested, manifest, branch, and tag versions
        id: version
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Release workflow must be dispatched from main, not ${GITHUB_REF}" >&2
            exit 1
          fi

          manifest_version=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "seiza-server") | .version')
          if [[ "${REQUESTED_VERSION}" != "${manifest_version}" ]]; then
            echo "Requested ${REQUESTED_VERSION}, but Cargo.toml is ${manifest_version}" >&2
            exit 1
          fi

          tag="v${manifest_version}"
          if git rev-parse --verify --quiet "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists" >&2
            exit 1
          fi

          echo "version=${manifest_version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
  package:
    name: ${{ matrix.target }} release RPM
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: al2023
            base: public.ecr.aws/amazonlinux/amazonlinux:2023
          - target: f44
            base: registry.fedoraproject.org/fedora:44
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build cached RPM builder image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packaging/rpm/Containerfile
          load: true
          tags: seiza-server-rpm-builder:${{ matrix.target }}
          build-args: |
            BASE=${{ matrix.base }}
            TARGET=${{ matrix.target }}
          cache-from: type=gha,scope=rpm-builder-${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=rpm-builder-${{ matrix.target }}
      - name: Restore RPM compiler caches
        uses: actions/cache@v6
        with:
          path: |
            .rpm-cache/${{ matrix.target }}/cargo
            .rpm-cache/${{ matrix.target }}/npm
            .rpm-cache/${{ matrix.target }}/target
          key: rpm-v1-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('Cargo.lock', 'frontend/package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            rpm-v1-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('Cargo.lock', 'frontend/package-lock.json') }}-
            rpm-v1-${{ runner.os }}-${{ matrix.target }}-
      - name: Build target-native RPM
        env:
          CONTAINER_ENGINE: docker
          SEIZA_SKIP_CONTAINER_BUILD: 1
        run: ./packaging/rpm/build-in-container.sh ${{ matrix.target }}
      - name: Verify package installation
        env:
          CONTAINER_ENGINE: docker
        run: ./packaging/rpm/verify-in-container.sh ${{ matrix.target }}
      - uses: actions/upload-artifact@v7
        with:
          name: seiza-server-${{ matrix.target }}-x86_64-rpm
          path: dist/rpm/${{ matrix.target }}/*.rpm
          if-no-files-found: error
          retention-days: 14

  github-release:
    name: Create GitHub release
    needs: [preflight, package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: seiza-server-*-x86_64-rpm
          path: release-artifacts
          merge-multiple: true
      - name: Create the tag and release with RPM assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.preflight.outputs.tag }}
        run: >-
          gh release create "${TAG}"
          --repo "${GITHUB_REPOSITORY}"
          --target "${GITHUB_SHA}"
          --title "Seiza Server ${TAG}"
          --generate-notes
          release-artifacts/*.rpm
