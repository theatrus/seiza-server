name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-v1-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-${{ github.sha }}
          restore-keys: |
            cargo-v1-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-
            cargo-v1-${{ runner.os }}-
      - run: cargo fmt --all --check
      - run: cargo clippy --locked --all-targets --features aws -- -D warnings
      - run: cargo test --locked --features aws

  web:
    name: Web and Playwright
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Restore Playwright browser
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-v2-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
      - name: Install Playwright browser and host dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium webkit
      - name: Install Playwright host dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium webkit
      - run: npm run lint
      - run: npm run build
      - run: npm run test:e2e
      - name: Store Playwright diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
          retention-days: ${{ github.ref == 'refs/heads/main' && 30 || 14 }}
