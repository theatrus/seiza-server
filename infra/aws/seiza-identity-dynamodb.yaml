AWSTemplateFormatVersion: '2010-09-09'
Description: Seiza Server identity store for accounts, credentials, challenges, and sessions.

Resources:
  SeizaIdentity:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl_epoch
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true

Outputs:
  TableName:
    Value: !Ref SeizaIdentity
  TableArn:
    Value: !GetAtt SeizaIdentity.Arn
