name: RPM packages

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  package:
    name: ${{ matrix.target }} RPM
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        target: [al2023, f44]
    steps:
      - uses: actions/checkout@v7
      - name: Build target-native RPM
        env:
          CONTAINER_ENGINE: docker
        run: ./packaging/rpm/build-in-container.sh ${{ matrix.target }}
      - name: Verify package installation
        env:
          CONTAINER_ENGINE: docker
        run: ./packaging/rpm/verify-in-container.sh ${{ matrix.target }}
      - uses: actions/upload-artifact@v7
        with:
          name: seiza-server-${{ matrix.target }}-x86_64-rpm
          path: dist/rpm/${{ matrix.target }}/*.rpm
          if-no-files-found: error
          retention-days: 14
